name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build --quiet

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  smoke-test-windows:
    name: Windows installer smoke-test
    runs-on: windows-latest
    needs: build-wheel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Create venv and install wheel
        shell: cmd
        run: |
          python -m venv test-venv
          call test-venv\Scripts\activate.bat
          pip install --upgrade pip --quiet
          for %%f in (dist\*.whl) do pip install "%%f" --quiet

      - name: Run setup with --skip-models
        shell: cmd
        run: |
          call test-venv\Scripts\activate.bat
          python setup.py --skip-models
          if %errorlevel% neq 0 exit /b 1

      - name: Verify CLI entry point
        shell: cmd
        run: |
          call test-venv\Scripts\activate.bat
          python -m arignan.cli --help

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-wheel, smoke-test-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generateReleaseNotes: true
          artifacts: "dist/*.whl,install.sh,install.bat"
          body: |
            ## Install

            ### macOS / Linux
            Download `install.sh` and run:
            ```sh
            sh install.sh
            ```

            ### Windows
            Download `install.bat` and double-click it.

            **Note:** Windows may show a SmartScreen prompt on first run — this is expected for unsigned scripts built from open source. Click "More info → Run anyway" to proceed.

            ---
            Built with GitHub Actions. Python 3.12.
